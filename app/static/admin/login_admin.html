<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход админа | Vie</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            position: relative;
            width: 1440px;
            height: 1024px;
            background: #A7AADB;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            margin: 0 auto;
            overflow: hidden;
        }

        .login-card {
            box-sizing: border-box;
            position: absolute;
            width: 400px;
            height: 500px;
            left: 520px;
            top: 262px;
            background: #FFFFFF;
            border: 5px solid #797FE0;
            border-radius: 30px;
            padding: 37px 34px;
        }

        .title {
            width: 322px;
            height: 81px;
            font-family: 'Inter', sans-serif;
            font-style: normal;
            font-weight: 500;
            font-size: 32px;
            line-height: 39px;
            display: flex;
            align-items: center;
            color: #13164B;
            margin-bottom: 0;
        }

        .input-group {
            margin-bottom: 30px;
        }

        .input-label {
            width: 200px;
            height: 24px;
            font-family: 'Inter', sans-serif;
            font-style: normal;
            font-weight: 400;
            font-size: 16px;
            line-height: 19px;
            display: flex;
            align-items: center;
            color: #13164B;
            margin-bottom: 8px;
        }

        .input-field {
            box-sizing: border-box;
            width: 333px;
            height: 60px;
            background: #A7AADB;
            border: 1px solid #13164B;
            border-radius: 30px;
            padding: 0 24px;
            font-family: 'Inter', sans-serif;
            font-style: normal;
            font-weight: 400;
            font-size: 16px;
            line-height: 19px;
            color: #13164B;
            outline: none;
        }

        .input-field::placeholder {
            color: rgba(19, 22, 75, 0.6);
        }

        .input-field:focus {
            border-width: 2px;
            background: #b8bbe8;
        }

        .login-btn {
            box-sizing: border-box;
            position: absolute;
            width: 197px;
            height: 41px;
            left: 102px;
            bottom: 57px;
            background: transparent;
            border: 1px solid #797FE0;
            border-radius: 30px;
            font-family: 'Inter', sans-serif;
            font-style: normal;
            font-weight: 400;
            font-size: 16px;
            line-height: 19px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #000000;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .login-btn:hover {
            background: #A7AADB;
            border-color: #13164B;
            color: #13164B;
        }

        .login-btn:active {
            background: #979bc9;
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .footer {
            position: absolute;
            width: 255px;
            height: 56px;
            left: 1185px;
            top: 960px;
            font-family: 'Inter', sans-serif;
            font-style: normal;
            font-weight: 400;
            font-size: 16px;
            line-height: 19px;
            display: flex;
            align-items: center;
            text-align: center;
            color: #13164B;
        }

        .error-message {
            position: absolute;
            width: 333px;
            height: 20px;
            left: 34px;
            top: 345px;
            font-family: 'Inter', sans-serif;
            font-style: normal;
            font-weight: 400;
            font-size: 14px;
            line-height: 17px;
            color: #ff4444;
            text-align: center;
        }

        .back-link {
            position: absolute;
            left: 520px;
            top: 780px;
            width: 400px;
            text-align: center;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: #13164B;
            text-decoration: none;
            opacity: 0.7;
        }

        .back-link:hover {
            opacity: 1;
            text-decoration: underline;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #13164B;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
            margin-left: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="title">Админ</div>

        <form id="loginForm">
            <div class="input-group">
                <div class="input-label">Введите логин</div>
                <input type="text" id="username" name="username" class="input-field" placeholder="логин" autocomplete="username" required>
            </div>

            <div class="input-group">
                <div class="input-label">Введите пароль</div>
                <input type="password" id="password" name="password" class="input-field" placeholder="••••••••" autocomplete="current-password" required>
            </div>

            <div id="errorMessage" class="error-message"></div>

            <button type="submit" class="login-btn" id="submitBtn">Войти</button>
        </form>
    </div>

    <a href="/" class="back-link">← Вернуться на главную</a>

    <div class="footer">Made by Vie</div>

</body>
</html>
