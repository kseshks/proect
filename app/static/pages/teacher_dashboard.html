<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Учитель - Панель управления</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/components/navigation.css">
    <link rel="stylesheet" href="../css/components/tables.css">
    <link rel="stylesheet" href="../css/components/buttons.css">
    <link rel="stylesheet" href="../css/components/cards.css">
    <link rel="stylesheet" href="../css/pages/teacher_dashboard.css">
</head>
<body>
    <div class="dashboard-container">
        <nav class="navbar">
            <div class="nav-buttons">
                <button class="nav-btn" id="ratingBtn" onclick="showRating()">Рейтинг</button>
                <button class="nav-btn" id="themesBtn" onclick="showThemesList()">Темы и тесты</button>
            </div>
            <button class="logout-btn" onclick="window.location.href='teacher_login.html'">Выйти</button>
        </nav>

        <!-- СЕКЦИЯ РЕЙТИНГ -->
        <div id="ratingSection" class="section active">
            <div class="rating-header">
                <h2>Рейтинг учеников</h2>
            </div>
            <div class="rating-table-container">
                <table class="rating-table">
                    <thead>
                        <tr>
                            <th>ID ученика</th>
                            <th>Хан Батый</th>
                            <th>Декабристы</th>
                            <th>Наполеон</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td>12345</td><td>3</td><td>4</td><td>5</td></tr>
                        <tr><td>34567</td><td>5</td><td>5</td><td>2</td></tr>
                        <tr><td>35487</td><td>4</td><td>2</td><td>5</td></tr>
                        <tr><td>25896</td><td>3</td><td>4</td><td>4</td></tr>
                        <tr><td>32578</td><td>5</td><td>5</td><td>5</td></tr>
                        <tr><td>65832</td><td>4</td><td>2</td><td>3</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- СЕКЦИЯ ТЕМЫ И ТЕСТЫ  -->
        <div id="themesListSection" class="section">
            <div class="themes-header">
                <h2>Темы и тесты</h2>
                <button class="add-theme-btn" onclick="showAddThemeForm()">+ Загрузить тему</button>
            </div>
            <div class="themes-grid" id="themesGrid">
                <div class="theme-card">
                    <span class="theme-name">Наполеон</span>
                    <button class="delete-theme-btn" onclick="deleteTheme('Наполеон')">Удалить</button>
                </div>
                <div class="theme-card">
                    <span class="theme-name">Хан Батый</span>
                    <button class="delete-theme-btn" onclick="deleteTheme('Хан Батый')">Удалить</button>
                </div>
                <div class="theme-card">
                    <span class="theme-name">Декабристы</span>
                    <button class="delete-theme-btn" onclick="deleteTheme('Декабристы')">Удалить</button>
                </div>
                <div class="theme-card">
                    <span class="theme-name">Куликовская битва</span>
                    <button class="delete-theme-btn" onclick="deleteTheme('Куликовская битва')">Удалить</button>
                </div>
            </div>
        </div>

        <!-- СЕКЦИЯ ФОРМА ДОБАВЛЕНИЯ ТЕМЫ -->
        <div id="addThemeFormSection" class="section">
            <div class="form-container">
                <h2>Добавление новой темы</h2>
                
                <div class="form-group">
                    <label>Название темы (PDF)</label>
                    <input type="text" id="themeName" placeholder="Наполеон.pdf" class="form-input">
                </div>

                <div class="form-group">
                    <label>Введите ID учеников</label>
                    <textarea id="studentIds" rows="3" placeholder="Введите ID учеников через запятую или пробел" class="form-textarea"></textarea>
                </div>

                <div class="form-group">
                    <label>Загрузите тест к теме</label>
                    <input type="file" id="testFile" accept=".pdf,.doc,.docx" class="form-file">
                    <small class="form-hint">Поддерживаемые форматы: PDF, DOC, DOCX</small>
                </div>

                <div class="form-buttons">
                    <button class="back-btn" onclick="showThemesList()">Назад</button>
                    <button class="confirm-btn" onclick="submitNewTheme()">Подтвердить</button>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>Made by Vie</p>
        </div>
    </div>

    <script>
        // Показ секции рейтинга
        function showRating() {
            document.getElementById('ratingSection').classList.add('active');
            document.getElementById('themesListSection').classList.remove('active');
            document.getElementById('addThemeFormSection').classList.remove('active');
            
            document.getElementById('ratingBtn').classList.add('active');
            document.getElementById('themesBtn').classList.remove('active');
        }
        
        // Показ списка тем
        function showThemesList() {
            document.getElementById('ratingSection').classList.remove('active');
            document.getElementById('themesListSection').classList.add('active');
            document.getElementById('addThemeFormSection').classList.remove('active');
            
            document.getElementById('ratingBtn').classList.remove('active');
            document.getElementById('themesBtn').classList.add('active');
        }
        
        // Показ формы добавления темы
        function showAddThemeForm() {
            document.getElementById('ratingSection').classList.remove('active');
            document.getElementById('themesListSection').classList.remove('active');
            document.getElementById('addThemeFormSection').classList.add('active');
            
            // Очищаем форму
            document.getElementById('themeName').value = '';
            document.getElementById('studentIds').value = '';
            document.getElementById('testFile').value = '';
        }
        
        // Отправка новой темы
        function submitNewTheme() {
            const themeName = document.getElementById('themeName').value;
            const studentIds = document.getElementById('studentIds').value;
            
            if (!themeName) {
                alert('Введите название темы');
                return;
            }
            
            if (!studentIds) {
                alert('Введите ID учеников');
                return;
            }
            
            // Добавляем новую тему в список
            const themesGrid = document.getElementById('themesGrid');
            const newTheme = document.createElement('div');
            newTheme.className = 'theme-card';
            const cleanName = themeName.replace('.pdf', '').replace('.doc', '').replace('.docx', '');
            newTheme.innerHTML = `
                <span class="theme-name">${cleanName}</span>
                <button class="delete-theme-btn" onclick="deleteTheme('${cleanName}')">Удалить</button>
            `;
            themesGrid.appendChild(newTheme);
            
            alert(`Тема "${cleanName}" успешно добавлена!`);
            
            // Возвращаемся к списку тем
            showThemesList();
        }
        
        // Удаление темы
        function deleteTheme(themeName) {
            if (confirm(`Вы уверены, что хотите удалить тему "${themeName}"?`)) {
                const themeCard = event.target.closest('.theme-card');
                if (themeCard) themeCard.remove();
                alert(`Тема "${themeName}" удалена`);
            }
        }
    </script>
</body>
</html>
