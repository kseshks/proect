<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление темами</title>
    <link rel="stylesheet" href="../../css/main.css">
    <link rel="stylesheet" href="../../css/components/buttons.css">
    <link rel="stylesheet" href="../../css/components/forms.css">
    <link rel="stylesheet" href="../../css/components/cards.css">
    <link rel="stylesheet" href="../../css/pages/admin_themes.css">
</head>
<body>
    <div class="container">
        <div class="form-card">
            <h2>Добавление новой темы</h2>
            <div class="admin-form">
                <div class="form-group">
                    <label for="teacher-name">Учитель</label>
                    <input type="text" id="teacher-name" class="form-input" placeholder="Имя учителя">
                </div>
                <div class="form-group">
                    <label for="theme-name">Тема Наполеон</label>
                    <input type="text" id="theme-name" class="form-input" placeholder="Название темы">
                </div>
                <div class="theme-actions-list">
                    <div class="theme-item">
                        <span>Тема Наполеон</span>
                        <button class="delete-small-btn">Удалить</button>
                    </div>
                    <div class="theme-item">
                        <span>Тема Наполеон</span>
                        <button class="delete-small-btn">Удалить</button>
                    </div>
                    <div class="theme-item">
                        <span>Тема Наполеон</span>
                        <button class="delete-small-btn">Удалить</button>
                    </div>
                    <div class="theme-item">
                        <span>Тема Наполеон</span>
                        <button class="delete-small-btn">Удалить</button>
                    </div>
                </div>
                <button class="add-small-btn">Добавить</button>
                <button class="delete-teacher-btn">Удалить учителя</button>
            </div>
            <div class="footer">
                <p>Made by Vie</p>
            </div>
        </div>
    </div>
</body>
</html>
