<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход учителя</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/components/buttons.css">
    <link rel="stylesheet" href="../css/components/forms.css">
    <link rel="stylesheet" href="../css/components/cards.css">
    <link rel="stylesheet" href="../css/pages/login.css">
</head>
<body>
    <div class="container">
        <div class="login-card">
            <h2>Окно входа учителя</h2>
            <div class="role-switch">
                <button class="role-btn" onclick="window.location.href='admin_login.html'">Войти как администратор</button>
                <button class="role-btn" onclick="window.location.href='student_login.html'">Войти как ученик</button>
            </div>

            <div class="login-form">
                <label>Введите логин и пароль</label>
                <input type="text" placeholder="Введите логин" class="form-input">
                <input type="password" placeholder="Введите пароль" class="form-input">
                <button class="submit-btn" onclick="window.location.href='teacher_dashboard.html'">Войти</button>
            </div>
            
            <div class="footer">
                <p>Made by Vie</p>
            </div>
        </div>
    </div>
</body>
</html>
