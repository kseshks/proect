<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Администратор</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/components/buttons.css">
    <link rel="stylesheet" href="../css/components/cards.css">
    <link rel="stylesheet" href="../css/components/forms.css">
    <link rel="stylesheet" href="../css/components/navigation.css">
    <link rel="stylesheet" href="../css/components/tables.css">
    <link rel="stylesheet" href="../css/pages/admin_dashboard.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="navbar">
            <button class="nav-btn active" data-tab="students">Ученики</button>
            <button class="nav-btn" data-tab="teachers">Учителя</button>
            <button class="nav-btn" data-tab="themes">Темы</button>
            <button class="logout-nav-btn" onclick="window.location.href='admin_login.html'">Выйти</button>
        </div>

        <!-- Ученики -->
        <div class="section active" id="students-section">
            <h2>Ученики</h2>
            <div class="action-buttons">
                <button class="action-btn" onclick="openAddStudentModal()">+ Добавить</button>
                <button class="action-btn download-btn" id="downloadBtn">📥 Скачать</button>
            </div>
            <div class="list-container" id="studentsList"></div>
        </div>

        <!-- Учителя -->
        <div class="section" id="teachers-section">
            <h2>Учителя</h2>
            <div class="action-buttons">
                <button class="action-btn" onclick="openAddTeacherModal()">+ Добавить учителя</button>
            </div>
            <div class="list-container" id="teachersList"></div>
        </div>

        <!-- Темы -->
        <div class="section" id="themes-section">
            <h2>Темы</h2>
            <div class="action-buttons">
                <button class="action-btn" onclick="openAddThemeModal()">+ Добавить тему</button>
            </div>
            <div class="themes-grid" id="themesList"></div>
        </div>
    </div>
    <!-- Модалки -->
    <div id="studentModal" class="modal"><div class="modal-content">
        <h3>Добавить учеников</h3>
        <input type="number" id="studentCount" placeholder="Количество">
        <button onclick="addStudents()">Подтвердить</button>
        <button onclick="closeModal('studentModal')">Назад</button>
    </div></div>

    <div id="teacherModal" class="modal"><div class="modal-content">
        <h3>Добавить учителя</h3>
        <input type="text" id="teacherName" placeholder="ФИО">
        <button onclick="addTeacher()">Подтвердить</button>
        <button onclick="closeModal('teacherModal')">Назад</button>
    </div></div>

    <div id="themeModal" class="modal"><div class="modal-content">
        <h3>Добавить тему</h3>
        <input type="text" id="themeName" placeholder="Название">
        <button onclick="addTheme()">Подтвердить</button>
        <button onclick="closeModal('themeModal')">Назад</button>
    </div></div>

    <div id="teacherThemesModal" class="modal"><div class="modal-content">
        <h3 id="teacherModalTitle">Темы учителя</h3>
        <div id="teacherThemesList"></div>
        <button onclick="closeModal('teacherThemesModal')">Назад</button>
        <button id="deleteTeacherFromModal">Удалить учителя</button>
    </div></div>

    <script>
        // Данные
        let students = [123456, 123457, 123458, 123459, 123460];
        let teachers = [
            { id: 1, name: 'Иванов', themes: ['Наполеон'] },
            { id: 2, name: 'Петров', themes: ['Наполеон'] }
        ];
        let themes = ['Наполеон', 'Вторая мировая'];

        // Рендер
        function render() {
            // Ученики
            document.getElementById('studentsList').innerHTML = students.map(id => `
                <div class="list-item">Ученик ${id} <button onclick="deleteStudent(${id})">Удалить</button></div>
            `).join('');
            
            // Учителя
            document.getElementById('teachersList').innerHTML = teachers.map(t => `
                <div class="list-item">Учитель ${t.name} 
                    <button onclick="viewTeacherThemes(${t.id})">Инфо</button>
                    <button onclick="deleteTeacher(${t.id})">Удалить</button>
                </div>
            `).join('');
            
            // Темы
            document.getElementById('themesList').innerHTML = themes.map(theme => `
                <div class="theme-card">${theme} <button onclick="deleteTheme('${theme}')">Удалить</button></div>
            `).join('');
        }

        // Ученики
        function addStudents() {
            let count = parseInt(document.getElementById('studentCount').value);
            let lastId = students[students.length-1] || 123456;
            for(let i = 1; i <= count; i++) students.push(lastId + i);
            render();
            closeModal('studentModal');
        }
        function deleteStudent(id) { students = students.filter(s => s !== id); render(); }
        
        // Учителя
        function addTeacher() {
            let name = document.getElementById('teacherName').value;
            let newId = Math.max(...teachers.map(t => t.id), 0) + 1;
            teachers.push({ id: newId, name: name, themes: [] });
            render();
            closeModal('teacherModal');
        }
        function deleteTeacher(id) { teachers = teachers.filter(t => t.id !== id); render(); }
        
        function viewTeacherThemes(id) {
            let teacher = teachers.find(t => t.id === id);
            document.getElementById('teacherModalTitle').innerText = `Темы: ${teacher.name}`;
            document.getElementById('teacherThemesList').innerHTML = teacher.themes.map(theme => `
                <div>${theme} <button onclick="deleteTeacherTheme(${id}, '${theme}')">Удалить</button></div>
            `).join('');
            document.getElementById('deleteTeacherFromModal').onclick = () => { deleteTeacher(id); closeModal('teacherThemesModal'); };
            openModal('teacherThemesModal');
        }
        function deleteTeacherTheme(teacherId, theme) {
            let teacher = teachers.find(t => t.id === teacherId);
            teacher.themes = teacher.themes.filter(t => t !== theme);
            viewTeacherThemes(teacherId);
            render();
        }
        
        // Темы
        function addTheme() {
            let name = document.getElementById('themeName').value;
            themes.push(name);
            render();
            closeModal('themeModal');
        }
        function deleteTheme(theme) { themes = themes.filter(t => t !== theme); render(); }

        // Модалки
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function openAddStudentModal() { openModal('studentModal'); }
        function openAddTeacherModal() { openModal('teacherModal'); }
        function openAddThemeModal() { openModal('themeModal'); }

        // Скачивание
        document.getElementById('downloadBtn').onclick = () => {
            let text = students.map((id, i) => `${i+1}. Ученик ${id}`).join('\n');
            let blob = new Blob([text], {type: 'text/plain'});
            let a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'students.txt';
            a.click();
        };

        // Вкладки
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                document.getElementById(btn.dataset.tab + '-section').classList.add('active');
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            };
        });

        render();
    </script>
</body>
</html>
